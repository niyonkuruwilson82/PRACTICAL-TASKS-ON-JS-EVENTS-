<!DOCTYPE html>
<html>
<head>
    <title>Form Events Practice</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
        }

        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 300px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #333;
        }

        label {
            font-weight: bold;
        }

        input[type="text"],
        input[type="email"] {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        input:focus {
            border-color: #007bff;
            outline: none;
        }

        input[type="submit"],
        input[type="reset"] {
            width: 48%;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            color: white;
        }

        input[type="submit"] {
            background-color: #28a745;
        }

        input[type="reset"] {
            background-color: #dc3545;
        }

        input[type="submit"]:hover {
            background-color: #218838;
        }

        input[type="reset"]:hover {
            background-color: #c82333;
        }

        .footer {
            margin-top: 15px;
            font-size: 12px;
            color: gray;
            text-align: center;
        }
    </style>

</head>

<body>

<div class="container">
    <h2>Form Events</h2>

    <form onsubmit="submitForm()" onreset="resetForm()">
        
        <label>Name:</label>
        <input type="text" name="name" 
               onchange="changeValue(this)" 
               onblur="blurInput()">

        <label>Email:</label>
        <input type="email" name="email" 
               onchange="changeValue(this)" 
               onblur="blurInput()">

        <div style="display:flex; justify-content: space-between;">
            <input type="submit" value="Submit">
            <input type="reset" value="Reset">
        </div>

    </form>

    <div class="footer">
        &copy; 2026 NIWILSON TRAINER- All Rights Reserved
    </div>
</div>

<script>
    function submitForm() {
        alert("Form submitted");
    }

    function changeValue(el) {
        console.log("New value: " + el.value);
    }

    function blurInput() {
        alert("Input lost focus");
    }

    function resetForm() {
        alert("Form reset");
    }
</script>

</body>
</html>
